<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColorfulLanding</title>
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/main.js"></script>
</head>
<body>
    <!-- Responsive Navigation Bar -->
    <nav id="navbar">
        <img src="assets/logo.png" alt="Logo" class="logo">
        <ul class="nav-links">
            <li><a href="#hero">Home</a></li>
            <li><a href="#features">Features</a></li>
            <li><a href="#footer">Contact</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section id="hero" class="hero-section">
        <div class="hero-container">
            <h1 class="hero-title">Welcome to ColorfulLanding</h1>
            <div class="hero-graphic"></div>
        </div>
    </section>

    <!-- Animated Content Area -->
    <section id="features" class="features-section">
        <div class="feature-card">
            <h2>Feature One</h2>
            <p>Brief description of feature one.</p>
        </div>
        <div class="feature-card">
            <h2>Feature Two</h2>
            <p>Brief description of feature two.</p>
        </div>
        <div class="feature-card">
            <h2>Feature Three</h2>
            <p>Brief description of feature three.</p>
        </div>
    </section>

    <!-- Footer -->
    <footer id="footer" class="site-footer">
        <div class="social-icons">
            <svg class="social-icon"><use href="assets/social-icons.svg#twitter"></use></svg>
            <svg class="social-icon"><use href="assets/social-icons.svg#facebook"></use></svg>
            <svg class="social-icon"><use href="assets/social-icons.svg#instagram"></use></svg>
        </div>
        <p class="copyright">© 2026 ColorfulLanding. All rights reserved.</p>
    </footer>

    <!-- Ensure DOM is ready -->
    <script defer src="js/main.js"></script>
</body>
</html>
